name: Deploy ScoutMind

"on":
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: scoutmind
  ECS_CLUSTER: scoutmind-cluster
  ECS_SERVICE: scoutmind-api
  ECS_TASK_DEFINITION: scoutmind-task
  ECS_CONTAINER_NAME: scoutmind-api
  ALB_NAME: scoutmind-alb
  LOG_GROUP: ecs-scoutmind

jobs:
  test:
    name: Validate project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python syntax
        run: python -m compileall -q app graph llm nodes utils main.py

  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_DEFINITION" \
            --query taskDefinition > task-definition.json

      - name: Clean task definition
        run: |
          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )' task-definition.json > clean-task-definition.json

      - name: Update image in task definition
        run: |
          jq --arg IMAGE "${{ steps.build.outputs.image }}" \
             --arg CONTAINER "$ECS_CONTAINER_NAME" \
             '(.containerDefinitions[] | select(.name == $CONTAINER) | .image) = $IMAGE' \
             clean-task-definition.json > new-task-definition.json

      - name: Register new task definition
        id: register-task
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-definition.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "task_def=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "${{ steps.register-task.outputs.task_def }}" \
            --force-new-deployment

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"

      - name: Verify deployment health
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names "$ALB_NAME" \
            --query "LoadBalancers[0].DNSName" \
            --output text)

          echo "Testing http://$ALB_DNS/health"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "http://$ALB_DNS/health")

          if [ "$STATUS" = "200" ]; then
            echo "Deployment successful"
          else
            echo "Health check failed with status $STATUS"
            exit 1
          fi

      - name: Debug ECS on failure
        if: failure()
        run: |
          echo "Fetching ECS service details..."
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"

          echo "Fetching recent logs..."
          aws logs tail "$LOG_GROUP" --since 5m || true
