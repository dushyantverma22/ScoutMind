deploy:
  name: Build, push, and deploy
  runs-on: ubuntu-latest
  needs: test
  if: github.ref == 'refs/heads/main' && github.event_name == 'push'

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

# ── AWS AUTH ─────────────────────────────
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

# ── ECR LOGIN ────────────────────────────
    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

# ── BUILD & PUSH ─────────────────────────
    - name: Build & push Docker image
      id: build
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

# ── DOWNLOAD TASK DEF ────────────────────
    - name: Download current task definition
      run: |
        aws ecs describe-task-definition \
          --task-definition scoutmind-task \
          --query taskDefinition > task-definition.json

# ── CLEAN TASK DEF (IMPORTANT FIX) ───────
    - name: Clean task definition
      run: |
        jq 'del(
          .taskDefinitionArn,
          .revision,
          .status,
          .requiresAttributes,
          .compatibilities,
          .registeredAt,
          .registeredBy
        )' task-definition.json > clean-task-definition.json

# ── UPDATE IMAGE (SAFE WAY) ──────────────
    - name: Update image in task definition
      id: task-def
      run: |
        jq --arg IMAGE "${{ steps.build.outputs.image }}" \
        '(.containerDefinitions[] | select(.name=="scoutmind-api") | .image) = $IMAGE' \
        clean-task-definition.json > new-task-definition.json

# ── REGISTER NEW TASK ────────────────────
    - name: Register new task definition
      id: register-task
      run: |
        TASK_DEF_ARN=$(aws ecs register-task-definition \
          --cli-input-json file://new-task-definition.json \
          --query "taskDefinition.taskDefinitionArn" \
          --output text)

        echo "task_def=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

# ── DEPLOY TO ECS ────────────────────────
    - name: Deploy to ECS
      run: |
        aws ecs update-service \
          --cluster scoutmind-cluster \
          --service scoutmind-api \
          --task-definition ${{ steps.register-task.outputs.task_def }} \
          --force-new-deployment

# ── WAIT FOR STABILITY ───────────────────
    - name: Wait for service stability
      run: |
        aws ecs wait services-stable \
          --cluster scoutmind-cluster \
          --services scoutmind-api

# ── HEALTH CHECK ─────────────────────────
    - name: Verify deployment health
      run: |
        ALB_DNS=$(aws elbv2 describe-load-balancers \
          --names scoutmind-alb \
          --query "LoadBalancers[0].DNSName" \
          --output text)

        echo "Testing http://$ALB_DNS/health"

        STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          http://$ALB_DNS/health)

        if [ "$STATUS" = "200" ]; then
          echo "✅ Deployment successful"
        else
          echo "❌ Health check failed"
          exit 1
        fi

# ── DEBUG ON FAILURE ─────────────────────
    - name: Debug ECS (on failure)
      if: failure()
      run: |
        echo "Fetching ECS service details..."
        aws ecs describe-services \
          --cluster scoutmind-cluster \
          --services scoutmind-api

        echo "Fetching recent logs..."
        aws logs tail ecs-scoutmind --since 5m || true